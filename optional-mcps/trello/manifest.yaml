# Nous-approved MCP catalog entry.
manifest_version: 1

name: trello
description: Manage Trello boards, lists, cards, labels, and checklists.
source: https://github.com/modelcontextprotocol/servers

transport:
  type: stdio
  command: npx
  args:
    - "-y"
    - "@modelcontextprotocol/server-trello"

auth:
  type: api_key
  env:
    - name: TRELLO_API_KEY
      prompt: "Trello API key (trello.com/power-ups/admin)"
      required: true
      secret: false
    - name: TRELLO_API_TOKEN
      prompt: "Trello API token (generate after entering API key at trello.com/1/authorize)"
      required: true
      secret: true

post_install: |
  Get your API key at https://trello.com/power-ups/admin, then generate a
  token by visiting:
    https://trello.com/1/authorize?expiration=never&scope=read,write&response_type=token&key=YOUR_API_KEY

  Start a new Hermes session to load the Trello tools.
