# Nous-approved MCP catalog entry.
manifest_version: 1

name: github
description: Manage GitHub repos — issues, PRs, commits, branches, files, searches, and more.
source: https://github.com/github/github-mcp-server

# GitHub's official remote MCP server with native OAuth 2.1 over Streamable HTTP.
transport:
  type: http
  url: https://api.githubcopilot.com/mcp/

auth:
  type: oauth

post_install: |
  On first connection, Hermes will open a browser to authenticate with GitHub.
  After auth, restart your Hermes session so the GitHub tools are loaded.

  You can re-run the tool checklist any time with:
    hermes mcp configure github
